<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Pergaminho do Escudeiro — Biblioteca Digital Medieval</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d060;--gold-b:#ffe87a;
  --ember:#ff6a1a;--text:#f5e8c0;--text-m:#c9a870;--text-d:#7a5c30;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'IM Fell English',serif;background:#080300;color:var(--text);}
body{display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 48px;overflow-y:auto;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.35;pointer-events:none;}

.page{position:relative;z-index:1;width:100%;max-width:440px;animation:revealUp .5s ease-out both;}

.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.nav-btn{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;font-weight:700;
  background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));
  border:1px solid rgba(201,168,76,.4);color:var(--gold-l);
  border-radius:4px;padding:6px 14px;cursor:pointer;transition:all .2s;
  text-decoration:none;display:inline-block;
}
.nav-btn:hover{background:rgba(201,168,76,.25);}

.pergaminho{
  background:linear-gradient(160deg,#1e1004,#130a02,#1c0e05);
  border:2px solid var(--gold);border-radius:8px;
  padding:2rem 1.6rem;position:relative;
  box-shadow:0 0 60px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.8);
  margin-bottom:1rem;
}
.pergaminho::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-b),transparent);
  background-size:200% 100%;animation:sweep 2.5s linear infinite;
}
.corner{position:absolute;width:20px;height:20px;border-color:rgba(201,168,76,.55);}
.corner.tl{top:8px;left:8px;border-top:2px solid;border-left:2px solid;}
.corner.tr{top:8px;right:8px;border-top:2px solid;border-right:2px solid;}
.corner.bl{bottom:8px;left:8px;border-bottom:2px solid;border-left:2px solid;}
.corner.br{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid;}

.avatar-section{display:flex;flex-direction:column;align-items:center;margin-bottom:1.4rem;}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:.8rem;}
.avatar-ring{
  width:100px;height:100px;border-radius:50%;
  border:3px solid var(--gold);
  background:linear-gradient(135deg,#2a1400,#1a0a00);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',serif;font-size:2rem;
  color:var(--gold-l);overflow:hidden;position:relative;
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;}

.role-badge{
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;font-weight:700;
  border-radius:12px;padding:3px 12px;margin-bottom:.2rem;text-align:center;
  color:var(--gold-l);border:1px solid rgba(201,168,76,.5);
}

.profile-name{
  font-family:'Cinzel Decorative',serif;font-weight:700;
  font-size:clamp(1rem,5vw,1.3rem);letter-spacing:.04em;
  background:linear-gradient(135deg,#f9e3a0,#f2c25c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:.9rem;line-height:1.3;
}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.2rem;}
.info-box{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);
  border-radius:5px;padding:.7rem;text-align:center;
}
.info-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.25rem;}
.info-value{font-size:.9rem;color:var(--text-m);}

.not-found{text-align:center;padding:3rem 1rem;font-family:'Cinzel',serif;color:var(--text-d);}
.not-found .nf-icon{font-size:3rem;margin-bottom:1rem;}
.not-found p{font-size:.75rem;letter-spacing:.1em;}

.loading-state{text-align:center;padding:4rem 1rem;}
.loading-rune{font-family:'UnifrakturMaguntia',cursive;font-size:3rem;color:var(--gold);animation:spin 2s linear infinite;display:inline-block;}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sweep{from{background-position:0% 50%}to{background-position:200% 50%}}
@keyframes revealUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="../assets/video/medieval-bg.mp4" type="video/mp4"/>
</video>

<div class="page">
  <nav class="top-nav">
    <a class="nav-btn" href="../index.html">← VOLTAR</a>
    <span style="font-family:'UnifrakturMaguntia',cursive;font-size:1.1rem;color:var(--gold-l);opacity:.7">Escudeiro</span>
  </nav>

  <div id="main-content">
    <div class="loading-state">
      <div class="loading-rune">⚜</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
(async function () {
  if (!window.SUPABASE_URL || window.SUPABASE_URL === 'SUA_URL_AQUI') return;
  const { createClient } = supabase;
  const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

  const params = new URLSearchParams(location.search);
  const userId = params.get('id');
  const main   = document.getElementById('main-content');

  function notFound() {
    main.innerHTML = '<div class="not-found"><div class="nf-icon">📜</div><p>ESCUDEIRO NÃO ENCONTRADO</p></div>';
  }

  if (!userId) { notFound(); return; }

  const { data, error } = await db.rpc('get_aluno_public', { p_id: userId });

  if (error || !data || data.length === 0) { notFound(); return; }

  const profile = data[0];
  const nome    = profile.nome_completo || '—';
  const parts   = nome.split(' ').filter(Boolean);
  const initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : (parts[0] ? parts[0][0].toUpperCase() : '?');

  const avatarInner = profile.avatar_url
    ? '<img src="' + profile.avatar_url + '" alt="' + nome + '">'
    : initials;

  main.innerHTML = `
    <div class="pergaminho">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="avatar-section">
        <div class="avatar-wrap">
          <div class="avatar-ring">${avatarInner}</div>
        </div>
        <div class="role-badge">ESCUDEIRO</div>
      </div>

      <div class="profile-name">${nome}</div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">SÉRIE</div>
          <div class="info-value" style="font-size:.85rem">${profile.serie || '—'}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Nº CHAMADA</div>
          <div class="info-value" style="font-size:.85rem">${profile.numero_chamada || '—'}</div>
        </div>
      </div>
    </div>
  `;
}());
</script>
</body>
</html>
