<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Completar Perfil — Biblioteca Digital Medieval</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d060;
  --ember:#ff6a1a;--text:#f5e8c0;--text-m:#c9a870;--text-d:#7a5c30;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'IM Fell English',serif;background:#080300;color:var(--text);}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;overflow-y:auto;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;}

.wrap{position:relative;z-index:1;width:100%;max-width:440px;animation:revealUp .6s ease-out both;}

.scroll{
  background:linear-gradient(160deg,#1e1004,#130a02,#1c0e05);
  border:2px solid var(--gold);border-radius:8px;
  padding:2rem 1.8rem 1.8rem;position:relative;
  box-shadow:0 0 60px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.8);
  overflow:hidden;
}
.scroll::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#ffe87a,transparent);
  background-size:200% 100%;animation:sweep 2.5s linear infinite;
}
.corner{position:absolute;width:20px;height:20px;border-color:rgba(201,168,76,.55);}
.corner.tl{top:8px;left:8px;border-top:2px solid;border-left:2px solid;}
.corner.tr{top:8px;right:8px;border-top:2px solid;border-right:2px solid;}
.corner.bl{bottom:8px;left:8px;border-bottom:2px solid;border-left:2px solid;}
.corner.br{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid;}

.title{
  font-family:'Cinzel Decorative',serif;font-weight:900;
  font-size:clamp(.95rem,4.5vw,1.2rem);letter-spacing:.06em;
  background:linear-gradient(135deg,#f9e3a0,#f2c25c,#b98b28);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:.3rem;
}
.sub{font-family:'UnifrakturMaguntia',serif;font-size:.95rem;color:var(--text-m);text-align:center;margin-bottom:1.4rem;}
.divider{display:flex;align-items:center;gap:8px;margin:0 auto 1.4rem;max-width:180px;color:var(--gold);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* Avatar preview */
.avatar-preview{
  display:flex;flex-direction:column;align-items:center;gap:.6rem;margin-bottom:1.4rem;
}
.avatar-ring{
  width:80px;height:80px;border-radius:50%;
  border:2px solid var(--gold);
  background:linear-gradient(135deg,#2a1400,#1a0a00);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',serif;font-size:1.6rem;
  color:var(--gold-l);overflow:hidden;
  box-shadow:0 0 20px rgba(201,168,76,.3);
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;}
.avatar-note{font-size:.65rem;color:var(--text-d);text-align:center;font-family:'Cinzel',serif;letter-spacing:.08em;}

.field{margin-bottom:1rem;}
.field label{display:block;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.4rem;}
.field input,.field select{
  width:100%;padding:.65rem .9rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.3);
  border-radius:4px;color:var(--text);
  font-family:'IM Fell English',serif;font-size:.95rem;
  outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.2);}
.field select option{background:#1a0e04;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}

.btn-primary{
  width:100%;padding:.75rem;border:none;border-radius:4px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.78rem;letter-spacing:.12em;
  background:linear-gradient(135deg,#c9a84c,#f0d060,#8a6414);
  color:#1a0800;box-shadow:0 2px 12px rgba(201,168,76,.35);
  transition:transform .15s,box-shadow .15s,opacity .15s;margin-top:.4rem;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,76,.55);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.msg{padding:.6rem .9rem;border-radius:4px;font-size:.8rem;margin-bottom:.9rem;font-family:'Cinzel',serif;letter-spacing:.05em;display:none;}
.msg.error{background:rgba(180,20,20,.15);border:1px solid rgba(180,60,60,.4);color:#f08080;}
.msg.show{display:block;}

@keyframes sweep{from{background-position:0% 50%}to{background-position:200% 50%}}
@keyframes revealUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
#btn-voltar{position:fixed;top:.7rem;left:.7rem;z-index:9999;background:rgba(0,0,0,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1.5px solid rgba(255,255,255,.22);border-radius:999px;padding:.38rem .95rem;color:rgba(255,255,255,.92);font-size:.72rem;font-weight:700;font-family:system-ui,sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;letter-spacing:.03em;transition:background .18s,border-color .18s;}
#btn-voltar:hover{background:rgba(0,0,0,.78);border-color:rgba(255,255,255,.55);}
</style>
</head>
<body>
<a id="btn-voltar" href="../index.html">&#8592; Biblioteca</a>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="../assets/gif/vide-de-fundo.mp4" type="video/mp4">
</video>

<div class="wrap">
  <div class="scroll">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <h1 class="title">Inscrição no Codex</h1>
    <p class="sub">Complete seu pergaminho de identidade</p>
    <div class="divider"><span>✦</span></div>

    <div class="avatar-preview">
      <div class="avatar-ring" id="avatar-ring"><span id="avatar-initials">?</span></div>
      <p class="avatar-note">O Professor atribuirá seu brasão pessoal</p>
    </div>

    <div id="msg" class="msg error"></div>

    <div class="field">
      <label>NOME COMPLETO</label>
      <input id="nome" type="text" placeholder="Seu nome completo" autocomplete="name" oninput="updateInitials(); buscarRoster()"/>
    </div>
    <div id="roster-info" style="display:none;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:5px;padding:.55rem .8rem;margin-bottom:.9rem;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;color:var(--gold-l);text-align:center"></div>
    <div id="roster-warn" style="display:none;background:rgba(180,20,20,.1);border:1px solid rgba(180,60,60,.3);border-radius:5px;padding:.55rem .8rem;margin-bottom:.9rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;color:#f08080;text-align:center">Nome não encontrado na lista da turma. Verifique se digitou o nome completo corretamente.</div>

    <button class="btn-primary" id="btn-salvar" onclick="salvarPerfil()">📜 SELAR MEU PERGAMINHO</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

let currentUser = null;

(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // Preenche nome se veio do cadastro
  const metaNome = session.user.user_metadata?.nome_completo || '';
  if (metaNome) {
    document.getElementById('nome').value = metaNome;
    updateInitials();
  }

  // Se já tem perfil completo, vai para o app
  const { data: profile } = await db.from('profiles')
    .select('nome_completo,serie,role')
    .eq('id', currentUser.id).single();
  if (profile?.nome_completo && profile?.serie) {
    window.location.href = profile.role === 'admin' ? 'admin.html' : '../index.html';
  }
})();

let rosterTimer = null;
function buscarRoster() {
  clearTimeout(rosterTimer);
  rosterTimer = setTimeout(async () => {
    const nome = document.getElementById('nome').value.trim();
    const info = document.getElementById('roster-info');
    const warn = document.getElementById('roster-warn');
    if (nome.length < 5) { info.style.display='none'; warn.style.display='none'; return; }
    const { data } = await db.from('student_roster')
      .select('serie,numero_chamada')
      .ilike('nome_completo', nome)
      .limit(1).maybeSingle();
    if (data) {
      info.textContent = data.serie + ' · Nº ' + data.numero_chamada;
      info.style.display = 'block';
      warn.style.display = 'none';
    } else {
      info.style.display = 'none';
      warn.style.display = 'block';
    }
  }, 600);
}

function updateInitials() {
  const nome = document.getElementById('nome').value.trim();
  const parts = nome.split(' ').filter(Boolean);
  const initials = parts.length >= 2
    ? parts[0][0] + parts[parts.length - 1][0]
    : parts[0]?.[0] || '?';
  document.getElementById('avatar-initials').textContent = initials.toUpperCase();
}

async function salvarPerfil() {
  const nome = document.getElementById('nome').value.trim();
  const btn  = document.getElementById('btn-salvar');
  const msg  = document.getElementById('msg');

  if (!nome) {
    msg.textContent = 'Preencha seu nome completo.';
    msg.classList.add('show'); return;
  }
  msg.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Selando…';

  // Busca série/chamada do roster pelo nome
  const { data: roster } = await db.from('student_roster')
    .select('serie,numero_chamada')
    .ilike('nome_completo', nome)
    .limit(1).maybeSingle();

  const { error } = await db.from('profiles').upsert({
    id: currentUser.id,
    nome_completo: nome,
    serie:          roster?.serie          || null,
    numero_chamada: roster?.numero_chamada || null,
    role: 'aluno',
    nivel: 0,
    pontos: 0,
    updated_at: new Date().toISOString(),
  });

  if (error) {
    msg.textContent = error.message;
    msg.classList.add('show');
    btn.disabled = false; btn.textContent = '📜 SELAR MEU PERGAMINHO';
  } else {
    window.location.href = '../index.html?intro=1';
  }
}
</script>
</body>
</html>
