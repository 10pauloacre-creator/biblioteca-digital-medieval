<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Pergaminho de Identidade — Biblioteca Digital Medieval</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d060;--gold-b:#ffe87a;
  --ember:#ff6a1a;--text:#f5e8c0;--text-m:#c9a870;--text-d:#7a5c30;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'IM Fell English',serif;background:#080300;color:var(--text);}
body{display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 40px;overflow-y:auto;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;}

.page{position:relative;z-index:1;width:100%;max-width:460px;animation:revealUp .6s ease-out both;}

/* ── Header nav ── */
.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.nav-btn{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;font-weight:700;
  background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));
  border:1px solid rgba(201,168,76,.4);color:var(--gold-l);
  border-radius:4px;padding:6px 12px;cursor:pointer;transition:all .2s;
}
.nav-btn:hover{background:rgba(201,168,76,.25);}
.nav-btn.danger{border-color:rgba(180,60,60,.4);color:#f08080;background:rgba(180,20,20,.1);}
.nav-btn.danger:hover{background:rgba(180,20,20,.25);}

/* ── Pergaminho card ── */
.pergaminho{
  background:linear-gradient(160deg,#1e1004,#130a02,#1c0e05);
  border:2px solid var(--gold);border-radius:8px;
  padding:2rem 1.6rem;position:relative;
  box-shadow:0 0 60px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.8);
  overflow:hidden;margin-bottom:1rem;
}
.pergaminho::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-b),transparent);
  background-size:200% 100%;animation:sweep 2.5s linear infinite;
}
.corner{position:absolute;width:20px;height:20px;border-color:rgba(201,168,76,.55);}
.corner.tl{top:8px;left:8px;border-top:2px solid;border-left:2px solid;}
.corner.tr{top:8px;right:8px;border-top:2px solid;border-right:2px solid;}
.corner.bl{bottom:8px;left:8px;border-bottom:2px solid;border-left:2px solid;}
.corner.br{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid;}

/* ── Avatar ── */
.avatar-section{display:flex;flex-direction:column;align-items:center;margin-bottom:1.4rem;}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:.8rem;}
.avatar-ring{
  width:100px;height:100px;border-radius:50%;
  border:3px solid var(--gold);
  background:linear-gradient(135deg,#2a1400,#1a0a00);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',serif;font-size:2rem;
  color:var(--gold-l);overflow:hidden;
  box-shadow:0 0 30px rgba(201,168,76,.4),0 0 60px rgba(201,168,76,.15);
  position:relative;
}
.avatar-frame-img{
  position:absolute;inset:-14px;
  width:calc(100% + 28px);height:calc(100% + 28px);
  pointer-events:none;z-index:10;object-fit:contain;
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;}
.avatar-upload-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,.55);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.45rem;letter-spacing:.1em;
  color:var(--gold-l);gap:3px;
}
.avatar-ring:hover .avatar-upload-overlay{opacity:1;}
.avatar-upload-overlay .cam-icon{font-size:1.4rem;line-height:1;}
.avatar-upload-spinner{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;
  font-size:1.4rem;
}
.avatar-upload-spinner.show{display:flex;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-icon{animation:spin 1s linear infinite;display:inline-block;}

/* ── Presença online ── */
.presence-dot{
  position:absolute;bottom:4px;right:4px;
  width:16px;height:16px;border-radius:50%;
  border:2.5px solid #080300;z-index:20;pointer-events:none;
}
.presence-dot.online{
  background:#22c55e;
  box-shadow:0 0 8px #22c55e,0 0 18px rgba(34,197,94,.7);
  animation:presence-pulse 2s ease-in-out infinite;
}
.presence-dot.offline{background:#dc2626;box-shadow:0 0 5px rgba(220,38,38,.4);}
@keyframes presence-pulse{
  0%,100%{box-shadow:0 0 8px #22c55e,0 0 18px rgba(34,197,94,.7);}
  50%{box-shadow:0 0 14px #22c55e,0 0 30px rgba(34,197,94,.9);}
}


.badge-admin{
  font-family:'Cinzel',serif;font-weight:900;font-size:.65rem;letter-spacing:.18em;
  background:linear-gradient(135deg,#c9a84c,#f0d060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  border:1px solid rgba(201,168,76,.5);border-radius:12px;
  padding:3px 12px;margin-bottom:.4rem;
}

/* ── Níveis: molduras do avatar ───────────────────────────────── */
.frame-nivel-1{border-color:#a09878;}
.frame-nivel-2{border-color:#c9a84c;}
.frame-nivel-3{border-color:#4fc3f7;}
.frame-nivel-4{border-color:#c084fc;}
.frame-nivel-5{border-color:#ff6a1a;}

/* ── Nível: badge dinâmico do aluno ───────────────────────────── */
.nivel-badge{
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;font-weight:700;
  border-radius:12px;padding:3px 12px;margin-bottom:.2rem;text-align:center;
}
.nivel-badge-1{color:#a09878;border:1px solid rgba(160,152,120,.4);}
.nivel-badge-2{color:var(--gold-l);border:1px solid rgba(201,168,76,.5);}
.nivel-badge-3{color:#4fc3f7;border:1px solid rgba(79,195,247,.5);background:rgba(79,195,247,.05);}
.nivel-badge-4{color:#c084fc;border:1px solid rgba(192,132,252,.5);background:rgba(192,132,252,.05);}
.nivel-badge-5{
  color:var(--ember);border:1px solid rgba(255,106,26,.55);
  background:rgba(255,106,26,.07);
  text-shadow:0 0 10px rgba(255,106,26,.5);
}

/* ── Estrelas de poder ────────────────────────────────────────── */
.nivel-stars-display{
  font-size:.95rem;letter-spacing:.22em;margin-bottom:.35rem;
  text-shadow:0 0 6px currentColor;
}

/* ── Info ── */
.profile-name{
  font-family:'Cinzel Decorative',serif;font-weight:700;
  font-size:clamp(1.1rem,5vw,1.4rem);letter-spacing:.04em;
  background:linear-gradient(135deg,#f9e3a0,#f2c25c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:1rem;line-height:1.3;
}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.2rem;}
.info-box{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);
  border-radius:5px;padding:.7rem;text-align:center;
}
.info-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.25rem;}
.info-value{font-size:.95rem;color:var(--text-m);}

/* ── Admin: seção de nível ── */
.admin-info{margin-bottom:1.2rem;}
.admin-stat{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);
  border-radius:5px;padding:.75rem 1rem;margin-bottom:.6rem;
}
.admin-stat-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.4rem;}
.admin-stat-value{font-size:1rem;color:var(--text-m);}
.level-bar-wrap{
  background:rgba(0,0,0,.35);border-radius:20px;height:10px;overflow:hidden;
  border:1px solid rgba(201,168,76,.2);margin-top:.5rem;
}
.level-bar{
  height:100%;width:100%;border-radius:20px;
  background:linear-gradient(90deg,#8a6414,#c9a84c,#ffe87a,#f0d060,#c9a84c);
  background-size:200% 100%;
  animation:sweep 2s linear infinite;
  box-shadow:0 0 8px rgba(255,220,80,.5);
}
.level-stars{font-size:1.1rem;letter-spacing:.15em;color:var(--gold-b);
  text-shadow:0 0 8px rgba(255,220,80,.7);margin-top:.3rem;}
.level-max-label{
  font-family:'Cinzel',serif;font-weight:900;font-size:.65rem;letter-spacing:.2em;
  background:linear-gradient(135deg,#f9e3a0,#f2c25c,#ffe87a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:right;margin-top:.2rem;
}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.6rem;}
.admin-grid .admin-stat{margin-bottom:0;text-align:center;}

.divider{display:flex;align-items:center;gap:8px;margin:0 auto 1rem;max-width:160px;color:var(--gold);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* ── Ações ── */
.actions{display:flex;flex-direction:column;gap:.7rem;}
.btn-action{
  width:100%;padding:.65rem;border:none;border-radius:4px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.72rem;letter-spacing:.1em;
  transition:transform .15s,box-shadow .15s,opacity .15s;
}
.btn-gold{
  background:linear-gradient(135deg,#c9a84c,#f0d060,#8a6414);
  color:#1a0800;box-shadow:0 2px 10px rgba(201,168,76,.3);
}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.5);}
.btn-outline{
  background:transparent;border:1px solid rgba(201,168,76,.35);color:var(--text-m);
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold-l);}
.btn-red{background:rgba(180,20,20,.15);border:1px solid rgba(180,60,60,.35);color:#f08080;}
.btn-red:hover{background:rgba(180,20,20,.3);}

/* ── Edit modal overlay ── */
.modal-overlay{
  position:fixed;inset:0;z-index:2000;background:rgba(4,2,0,.92);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);display:none;
}
.modal-overlay.open{display:flex;}
.modal-box{
  max-width:400px;width:90%;
  background:linear-gradient(160deg,#1e1004,#130a02);
  border:2px solid var(--gold);border-radius:8px;
  padding:1.8rem 1.5rem;
  box-shadow:0 0 60px rgba(201,168,76,.3);
  position:relative;max-height:90vh;overflow-y:auto;
}
.modal-title{
  font-family:'Cinzel Decorative',serif;font-size:1rem;font-weight:900;
  color:var(--gold-l);text-align:center;margin-bottom:1.2rem;
}
.field{margin-bottom:.9rem;}
.field label{display:block;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.35rem;}
.field input,.field select{
  width:100%;padding:.6rem .85rem;background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.3);border-radius:4px;
  color:var(--text);font-family:'IM Fell English',serif;font-size:.92rem;
  outline:none;-webkit-appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field select option{background:#1a0e04;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.modal-actions{display:flex;gap:.7rem;margin-top:1rem;}
.modal-actions .btn-action{flex:1;}

.msg{padding:.55rem .85rem;border-radius:4px;font-size:.75rem;margin-bottom:.8rem;font-family:'Cinzel',serif;display:none;}
.msg.error{background:rgba(180,20,20,.15);border:1px solid rgba(180,60,60,.4);color:#f08080;}
.msg.success{background:rgba(20,100,20,.15);border:1px solid rgba(60,160,60,.4);color:#80d080;}
.msg.show{display:block;}

@keyframes sweep{from{background-position:0% 50%}to{background-position:200% 50%}}
@keyframes revealUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ── Quiz Results Section ── */
#quiz-results-section{
  width:100%;max-width:460px;margin-top:1.2rem;
  position:relative;z-index:1;
}
.qr-section-title{
  font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.18em;font-weight:700;
  color:var(--gold-l);text-align:center;margin-bottom:.8rem;
  display:flex;align-items:center;gap:8px;
}
.qr-section-title::before,.qr-section-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.qr-book-block{
  background:linear-gradient(160deg,#1e1004,#130a02,#1c0e05);
  border:1px solid rgba(201,168,76,.25);border-radius:8px;
  padding:1rem;margin-bottom:.8rem;
}
.qr-book-name{
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;
  color:var(--gold-l);margin-bottom:.6rem;padding-bottom:.5rem;
  border-bottom:1px solid rgba(201,168,76,.2);
}
.qr-quiz-row{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.1);
  border-radius:5px;padding:.65rem .8rem;margin-bottom:.4rem;
}
.qr-quiz-header{
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;gap:.5rem;
}
.qr-quiz-label{font-size:.78rem;color:var(--text-m);flex:1;}
.qr-quiz-score{
  font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;
  padding:.2rem .6rem;border-radius:999px;
}
.qr-quiz-score.perfect{background:rgba(20,180,80,.2);color:#80efa0;border:1px solid rgba(20,180,80,.4);}
.qr-quiz-score.good{background:rgba(200,160,20,.2);color:#f0d060;border:1px solid rgba(200,160,20,.4);}
.qr-quiz-score.low{background:rgba(180,40,20,.2);color:#f09080;border:1px solid rgba(180,40,20,.4);}
.qr-quiz-chevron{font-size:.7rem;color:var(--text-d);transition:transform .2s;}
.qr-quiz-chevron.open{transform:rotate(180deg);}
.qr-answers{display:none;margin-top:.5rem;padding-top:.5rem;border-top:1px solid rgba(201,168,76,.1);}
.qr-answers.open{display:block;}
.qr-answer-row{
  display:flex;align-items:center;gap:.5rem;
  font-size:.72rem;color:var(--text-m);padding:.2rem 0;
}
.qr-answer-row .qa-icon{font-size:.8rem;}
.qr-answer-row .qa-id{font-family:'Cinzel',serif;font-size:.6rem;color:var(--text-d);min-width:50px;}
.qr-empty{
  text-align:center;font-size:.78rem;color:var(--text-d);
  padding:1.2rem;border:1px dashed rgba(201,168,76,.2);
  border-radius:8px;
}
</style>
</head>
<body>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="../assets/gif/vide-de-fundo.mp4" type="video/mp4">
</video>

<div class="page">
  <div class="top-nav">
    <button class="nav-btn" onclick="window.location.href='../index.html'">⬅ Biblioteca</button>
    <button class="nav-btn" id="btn-admin" style="display:none" onclick="window.location.href='admin.html'">⚜ Painel Admin</button>
    <button class="nav-btn danger" onclick="doLogout()">Sair</button>
  </div>

  <div class="pergaminho" id="pergaminho">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="avatar-section">
      <div class="avatar-wrap" id="avatar-wrap">
      <div class="avatar-ring" id="avatar-ring">
<img id="avatar-img" style="display:none" alt="Avatar"/>
        <span id="avatar-initials">…</span>
        <div class="avatar-upload-overlay" id="avatar-upload-overlay" style="display:none" onclick="document.getElementById('avatar-file-input').click()">
          <span class="cam-icon">📷</span>
          <span>ALTERAR</span>
        </div>
        <div class="avatar-upload-spinner" id="avatar-spinner">
          <span class="spin-icon">⚙️</span>
        </div>
      </div>
      <img id="avatar-frame-img" class="avatar-frame-img" src="" alt="" style="display:none">
      </div>
      <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="uploadAvatar(event)"/>
      <div id="badge-admin" class="badge-admin" style="display:none">⚜ MAGO SUPREMO ⚜</div>
      <div id="nivel-badge" class="nivel-badge nivel-badge-1" style="display:none">
        <span id="nivel-nome-badge">APRENDIZ</span>
        <span id="nivel-serie-badge" style="font-size:.5rem;opacity:.7;margin-left:.5em;font-weight:400;letter-spacing:.1em"></span>
      </div>
      <div id="nivel-stars-display" class="nivel-stars-display" style="display:none;color:#a09878">★☆☆☆☆</div>
    </div>

    <h2 class="profile-name" id="profile-name">Carregando…</h2>

    <div class="divider"><span>✦</span></div>

    <div id="info-section"><!-- preenchido pelo JS --></div>

    <div class="actions" id="actions-section"></div>
  </div>

  <!-- Quiz results — visible to admin viewing a student profile -->
  <div id="quiz-results-section" style="display:none">
    <div class="qr-section-title">📊 DESEMPENHO NOS QUIZZES</div>
    <div id="quiz-results-body"></div>
  </div>
</div>

<!-- Modal de edição -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box">
    <div class="modal-title">Editar Pergaminho</div>
    <div id="msg-edit" class="msg error"></div>
    <div class="field">
      <label>NOME COMPLETO</label>
      <input id="edit-nome" type="text"/>
    </div>
    <div class="row2">
      <div class="field">
        <label>SÉRIE</label>
        <select id="edit-serie">
          <option value="">—</option>
          <option value="1ª Série">1ª Série</option>
          <option value="2ª Série">2ª Série</option>
          <option value="3ª Série">3ª Série</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Nº CHAMADA</label>
      <input id="edit-numero" type="number" min="1" max="60"/>
    </div>
    <div class="modal-actions">
      <button class="btn-action btn-outline" onclick="closeModal()">CANCELAR</button>
      <button class="btn-action btn-gold" id="btn-save-edit" onclick="saveEdit()">SALVAR</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/nivel.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

function renderNivelBadge(profile) {
  const nivel  = profile.nivel  || 1;
  const pontos = profile.pontos || 0;
  const info   = window.getNivelInfo(nivel);

  // Moldura colorida do avatar
  const ring = document.getElementById('avatar-ring');
  for (let i = 1; i <= 5; i++) ring.classList.remove('frame-nivel-' + i);
  ring.classList.add(info.frameClass);

  // Imagem PNG do frame (nível 0 não tem frame)
  const frameImg = document.getElementById('avatar-frame-img');
  if (frameImg) {
    if (nivel > 0) {
      frameImg.src = '../assets/images/frames/frame-nivel-' + nivel + '.png';
      frameImg.style.display = 'block';
    } else {
      frameImg.style.display = 'none';
    }
  }

  // Badge com nome do nível + série
  const badge = document.getElementById('nivel-badge');
  badge.className = 'nivel-badge nivel-badge-' + nivel;
  badge.style.display = 'block';
  document.getElementById('nivel-nome-badge').textContent = info.nome.toUpperCase();
  const serieBadge = document.getElementById('nivel-serie-badge');
  if (serieBadge) serieBadge.textContent = profile.serie ? '· ' + profile.serie : '';

  // Estrelas
  const starsEl = document.getElementById('nivel-stars-display');
  starsEl.style.display = 'block';
  starsEl.style.color   = info.cor;
  starsEl.textContent   = window.getNivelStars(nivel);
}

let viewingId = null;
let currentUser = null;
let currentProfile = null;

(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // Pode ver perfil de outro aluno via ?id=UUID
  const params = new URLSearchParams(location.search);
  viewingId = params.get('id') || currentUser.id;

  await loadProfile(viewingId);
})();

async function loadProfile(uid) {
  const { data: profile, error } = await db.from('profiles').select('*').eq('id', uid).single();
  if (error || !profile) {
    document.getElementById('profile-name').textContent = 'Perfil não encontrado';
    return;
  }

  const { data: myProfile } = await db.from('profiles').select('role').eq('id', currentUser.id).single();
  const isAdmin  = myProfile?.role === 'admin';
  const isOwner  = uid === currentUser.id;

  currentProfile = profile;

  // Avatar
  if (profile.avatar_url) {
    document.getElementById('avatar-img').src = profile.avatar_url;
    document.getElementById('avatar-img').style.display = 'block';
    document.getElementById('avatar-initials').style.display = 'none';
  } else {
    const parts = profile.nome_completo.split(' ').filter(Boolean);
    const ini = parts.length >= 2 ? parts[0][0]+parts[parts.length-1][0] : parts[0]?.[0] || '?';
    document.getElementById('avatar-initials').textContent = ini.toUpperCase();
  }

  // Badge + moldura avatar
  if (profile.role === 'admin') {
    document.getElementById('badge-admin').style.display = 'block';
    document.getElementById('avatar-ring').classList.add('frame-nivel-5');
    const fi = document.getElementById('avatar-frame-img');
    if (fi) { fi.src = '../assets/images/frames/frame-nivel-5.png'; fi.style.display = 'block'; }
  } else {
    renderNivelBadge(profile);
  }

  document.getElementById('profile-name').textContent = profile.nome_completo || '(sem nome)';

  const dataMembro = profile.created_at
    ? new Date(profile.created_at).toLocaleDateString('pt-BR', {month:'short', year:'numeric'})
    : '—';

  const infoSection = document.getElementById('info-section');

  if (profile.role === 'admin') {
    // Busca total de alunos para exibir nas estatísticas do admin
    const { count } = await db.from('profiles').select('id', { count: 'exact', head: true }).eq('role', 'aluno');
    const totalAlunos = count ?? '—';

    infoSection.innerHTML = `
      <div class="admin-info">
        <div class="admin-stat">
          <div class="admin-stat-label">NÍVEL DE ARCANO</div>
          <div class="level-bar-wrap"><div class="level-bar"></div></div>
          <div class="level-stars">★★★★★</div>
          <div class="level-max-label">⚜ NÍVEL MÁXIMO ATINGIDO ⚜</div>
        </div>
        <div class="admin-grid">
          <div class="admin-stat">
            <div class="admin-stat-label">ESCUDEIROS</div>
            <div class="admin-stat-value">${totalAlunos}</div>
          </div>
          <div class="admin-stat">
            <div class="admin-stat-label">MEMBRO DESDE</div>
            <div class="admin-stat-value">${dataMembro}</div>
          </div>
        </div>
      </div>`;
  } else {
    const nivel  = profile.nivel  || 1;
    const pontos = profile.pontos || 0;
    const nInfo  = window.getNivelInfo(nivel);
    const stars  = window.getNivelStars(nivel);
    const pct    = window.getNivelProgress(nivel, pontos);
    const proxTxt = window.getNivelProxTxt(nivel, pontos);
    const barColor = nivel >= 5
      ? 'linear-gradient(90deg,#c9a84c,#ff6a1a,#ffe87a)'
      : `linear-gradient(90deg,${nInfo.cor}60,${nInfo.cor})`;
    infoSection.innerHTML = `
      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">SÉRIE</div>
          <div class="info-value">${profile.serie || '—'}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Nº CHAMADA</div>
          <div class="info-value">${profile.numero_chamada ?? '—'}</div>
        </div>
        <div class="info-box" style="grid-column:span 2">
          <div class="info-label">MEMBRO DESDE</div>
          <div class="info-value">${dataMembro}</div>
        </div>
      </div>
      <div class="admin-stat" style="margin-bottom:.8rem">
        <div class="admin-stat-label">NÍVEL DE PODER</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin:.35rem 0">
          <div style="font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;color:${nInfo.cor};
            text-shadow:0 0 8px ${nInfo.corGlow}">${nInfo.nome}</div>
          <div style="font-size:1rem;letter-spacing:.2em;color:${nInfo.cor};
            text-shadow:0 0 8px ${nInfo.corGlow}">${stars}</div>
        </div>
        <div class="level-bar-wrap">
          <div class="level-bar" style="width:${pct}%;background:${barColor};box-shadow:0 0 8px ${nInfo.corGlow}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.35rem">
          <span style="font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.12em;color:var(--text-d)">
            ${pontos} PONTOS
          </span>
          <span style="font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.1em;color:var(--text-d)">
            ${proxTxt}
          </span>
        </div>
      </div>`;
  }

  // Botão admin
  if (isAdmin) document.getElementById('btn-admin').style.display = 'block';

  // Overlay de upload de avatar — só para o próprio dono
  if (isOwner) {
    document.getElementById('avatar-upload-overlay').style.display = 'flex';
  }

  // Ações
  const actions = document.getElementById('actions-section');
  if (isOwner || isAdmin) {
    actions.innerHTML = `<button class="btn-action btn-gold" onclick="openModal()">✏ EDITAR PERGAMINHO</button>`;
  }
  if (isAdmin && !isOwner) {
    actions.innerHTML += `<button class="btn-action btn-red" onclick="confirmarDelete()">🗑 Remover Aluno</button>`;
  }

  // Quiz results: visible to admin viewing a student, or to the student viewing own profile
  if ((isAdmin || isOwner) && profile.role !== 'admin') {
    await loadQuizResults(uid);
  }
}

async function loadQuizResults(uid) {
  const { data, error } = await db
    .from('quiz_results')
    .select('*')
    .eq('user_id', uid)
    .order('book_label', { ascending: true })
    .order('quiz_id',    { ascending: true });

  const section = document.getElementById('quiz-results-section');
  const body    = document.getElementById('quiz-results-body');
  if (!section || !body) return;

  if (error || !data || data.length === 0) {
    body.innerHTML = '<div class="qr-empty">Nenhum quiz realizado ainda.</div>';
    section.style.display = 'block';
    return;
  }

  // Group by book_label
  const byBook = {};
  data.forEach(r => {
    if (!byBook[r.book_label]) byBook[r.book_label] = [];
    byBook[r.book_label].push(r);
  });

  let html = '';
  Object.entries(byBook).forEach(([bookLbl, quizzes]) => {
    html += `<div class="qr-book-block">`;
    html += `<div class="qr-book-name">📖 ${escHtml(bookLbl)}</div>`;
    quizzes.forEach((q, qi) => {
      const pct    = q.total > 0 ? Math.round(q.correct / q.total * 100) : 0;
      const grade  = pct === 100 ? 'perfect' : pct >= 60 ? 'good' : 'low';
      const rowId  = `qr-row-${uid.slice(0,8)}-${qi}`;
      const label  = escHtml(q.quiz_label || q.quiz_id);
      const date   = q.completed_at
        ? new Date(q.completed_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' })
        : '';

      /* Build per-question detail rows */
      let ansHtml = '';
      if (Array.isArray(q.answers) && q.answers.length > 0) {
        q.answers.forEach((a, ai) => {
          const icon = a.correct ? '✅' : '❌';
          const txt  = a.correct ? 'Correto' : 'Errado';
          const qLabel = escHtml(a.questionId || ('Questão ' + (ai + 1)));
          ansHtml += `<div class="qr-answer-row">
            <span class="qa-icon">${icon}</span>
            <span class="qa-id">${qLabel}</span>
            <span>${txt}</span>
          </div>`;
        });
      } else {
        ansHtml = '<div class="qr-answer-row"><span style="color:var(--text-d)">Detalhes não disponíveis</span></div>';
      }

      html += `
        <div class="qr-quiz-row">
          <div class="qr-quiz-header" onclick="toggleQrRow('${rowId}')">
            <span class="qr-quiz-label">${label}${date ? ' <span style="font-size:.65rem;color:var(--text-d)">· ' + date + '</span>' : ''}</span>
            <span class="qr-quiz-score ${grade}">${q.correct}/${q.total} (${pct}%)</span>
            <span class="qr-quiz-chevron" id="${rowId}-chev">▼</span>
          </div>
          <div class="qr-answers" id="${rowId}">${ansHtml}</div>
        </div>`;
    });
    html += `</div>`;
  });

  body.innerHTML = html;
  section.style.display = 'block';
}

function toggleQrRow(id) {
  const el   = document.getElementById(id);
  const chev = document.getElementById(id + '-chev');
  if (!el) return;
  const open = el.classList.toggle('open');
  if (chev) chev.classList.toggle('open', open);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal() {
  document.getElementById('edit-nome').value   = currentProfile.nome_completo || '';
  document.getElementById('edit-serie').value  = currentProfile.serie || '';
  document.getElementById('edit-numero').value = currentProfile.numero_chamada || '';
  document.getElementById('modal-edit').classList.add('open');
}
function closeModal() { document.getElementById('modal-edit').classList.remove('open'); }

async function saveEdit() {
  const nome   = document.getElementById('edit-nome').value.trim();
  const serie  = document.getElementById('edit-serie').value;
  const numero = parseInt(document.getElementById('edit-numero').value) || null;
  const btn    = document.getElementById('btn-save-edit');
  const msg    = document.getElementById('msg-edit');
  if (!nome) { msg.textContent='Nome obrigatório.'; msg.className='msg error show'; return; }
  msg.className='msg'; btn.disabled=true; btn.textContent='Salvando…';
  const { error } = await db.from('profiles').update({
    nome_completo: nome, serie: serie||null, numero_chamada: numero
  }).eq('id', viewingId);
  if (error) {
    msg.textContent = error.message; msg.className='msg error show';
    btn.disabled=false; btn.textContent='SALVAR';
  } else {
    closeModal();
    await loadProfile(viewingId);
  }
}

async function confirmarDelete() {
  if (!confirm('Remover este aluno permanentemente?')) return;
  await db.from('profiles').delete().eq('id', viewingId);
  await db.auth.admin?.deleteUser(viewingId).catch(()=>{});
  window.location.href = 'admin.html';
}

async function doLogout() {
  await db.auth.signOut();
  window.location.href = '../index.html';
}

document.getElementById('modal-edit').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-edit')) closeModal();
});

async function uploadAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Validação: máx 2 MB e apenas imagens
  if (file.size > 2 * 1024 * 1024) {
    alert('A imagem deve ter no máximo 2 MB.');
    event.target.value = '';
    return;
  }

  const spinner = document.getElementById('avatar-spinner');
  const overlay = document.getElementById('avatar-upload-overlay');
  spinner.classList.add('show');
  overlay.style.display = 'none';

  try {
    const ext  = file.name.split('.').pop().toLowerCase();
    const path = `${currentUser.id}.${ext}`;

    // Faz upload para o bucket "avatares" (upsert para sobrescrever)
    const { error: upErr } = await db.storage
      .from('avatares')
      .upload(path, file, { upsert: true, contentType: file.type });

    if (upErr) throw upErr;

    // Pega URL pública
    const { data: urlData } = db.storage.from('avatares').getPublicUrl(path);
    const publicUrl = urlData.publicUrl;

    // Atualiza o perfil
    const { error: dbErr } = await db.from('profiles')
      .update({ avatar_url: publicUrl })
      .eq('id', currentUser.id);

    if (dbErr) throw dbErr;

    // Atualiza a UI sem recarregar tudo
    const img = document.getElementById('avatar-img');
    img.src = publicUrl + '?t=' + Date.now(); // evita cache
    img.style.display = 'block';
    document.getElementById('avatar-initials').style.display = 'none';
    currentProfile.avatar_url = publicUrl;
  } catch (err) {
    alert('Erro ao enviar foto: ' + err.message);
  } finally {
    spinner.classList.remove('show');
    overlay.style.display = 'flex';
    event.target.value = '';
  }
}
</script>
