<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Pergaminho de Identidade — Biblioteca Digital Medieval</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d060;--gold-b:#ffe87a;
  --ember:#ff6a1a;--text:#f5e8c0;--text-m:#c9a870;--text-d:#7a5c30;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'IM Fell English',serif;background:#080300;color:var(--text);}
body{display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 40px;overflow-y:auto;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;}

.page{position:relative;z-index:1;width:100%;max-width:460px;animation:revealUp .6s ease-out both;}

/* ── Header nav ── */
.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.nav-btn{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;font-weight:700;
  background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));
  border:1px solid rgba(201,168,76,.4);color:var(--gold-l);
  border-radius:4px;padding:6px 12px;cursor:pointer;transition:all .2s;
}
.nav-btn:hover{background:rgba(201,168,76,.25);}
.nav-btn.danger{border-color:rgba(180,60,60,.4);color:#f08080;background:rgba(180,20,20,.1);}
.nav-btn.danger:hover{background:rgba(180,20,20,.25);}

/* ── Pergaminho card ── */
.pergaminho{
  background:linear-gradient(160deg,#1e1004,#130a02,#1c0e05);
  border:2px solid var(--gold);border-radius:8px;
  padding:2rem 1.6rem;position:relative;
  box-shadow:0 0 60px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.8);
  overflow:hidden;margin-bottom:1rem;
}
.pergaminho::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-b),transparent);
  background-size:200% 100%;animation:sweep 2.5s linear infinite;
}
.corner{position:absolute;width:20px;height:20px;border-color:rgba(201,168,76,.55);}
.corner.tl{top:8px;left:8px;border-top:2px solid;border-left:2px solid;}
.corner.tr{top:8px;right:8px;border-top:2px solid;border-right:2px solid;}
.corner.bl{bottom:8px;left:8px;border-bottom:2px solid;border-left:2px solid;}
.corner.br{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid;}

/* ── Avatar ── */
.avatar-section{display:flex;flex-direction:column;align-items:center;margin-bottom:1.4rem;}
.avatar-ring{
  width:100px;height:100px;border-radius:50%;
  border:3px solid var(--gold);
  background:linear-gradient(135deg,#2a1400,#1a0a00);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',serif;font-size:2rem;
  color:var(--gold-l);overflow:hidden;
  box-shadow:0 0 30px rgba(201,168,76,.4),0 0 60px rgba(201,168,76,.15);
  position:relative;margin-bottom:.8rem;
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;}

/* Admin: coroa dourada */
.crown{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  font-size:1.4rem;filter:drop-shadow(0 2px 8px rgba(255,200,0,.8));
}

.badge-admin{
  font-family:'Cinzel',serif;font-weight:900;font-size:.65rem;letter-spacing:.18em;
  background:linear-gradient(135deg,#c9a84c,#f0d060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  border:1px solid rgba(201,168,76,.5);border-radius:12px;
  padding:3px 12px;margin-bottom:.4rem;
}
.badge-aluno{
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;
  color:var(--text-d);border:1px solid rgba(120,80,30,.4);border-radius:12px;padding:3px 10px;
  margin-bottom:.4rem;
}

/* ── Info ── */
.profile-name{
  font-family:'Cinzel Decorative',serif;font-weight:700;
  font-size:clamp(1.1rem,5vw,1.4rem);letter-spacing:.04em;
  background:linear-gradient(135deg,#f9e3a0,#f2c25c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:1rem;line-height:1.3;
}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.2rem;}
.info-box{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);
  border-radius:5px;padding:.7rem;text-align:center;
}
.info-label{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.25rem;}
.info-value{font-size:.95rem;color:var(--text-m);}

.divider{display:flex;align-items:center;gap:8px;margin:0 auto 1rem;max-width:160px;color:var(--gold);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* ── Ações ── */
.actions{display:flex;flex-direction:column;gap:.7rem;}
.btn-action{
  width:100%;padding:.65rem;border:none;border-radius:4px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.72rem;letter-spacing:.1em;
  transition:transform .15s,box-shadow .15s,opacity .15s;
}
.btn-gold{
  background:linear-gradient(135deg,#c9a84c,#f0d060,#8a6414);
  color:#1a0800;box-shadow:0 2px 10px rgba(201,168,76,.3);
}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.5);}
.btn-outline{
  background:transparent;border:1px solid rgba(201,168,76,.35);color:var(--text-m);
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold-l);}
.btn-red{background:rgba(180,20,20,.15);border:1px solid rgba(180,60,60,.35);color:#f08080;}
.btn-red:hover{background:rgba(180,20,20,.3);}

/* ── Edit modal overlay ── */
.modal-overlay{
  position:fixed;inset:0;z-index:2000;background:rgba(4,2,0,.92);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);display:none;
}
.modal-overlay.open{display:flex;}
.modal-box{
  max-width:400px;width:90%;
  background:linear-gradient(160deg,#1e1004,#130a02);
  border:2px solid var(--gold);border-radius:8px;
  padding:1.8rem 1.5rem;
  box-shadow:0 0 60px rgba(201,168,76,.3);
  position:relative;max-height:90vh;overflow-y:auto;
}
.modal-title{
  font-family:'Cinzel Decorative',serif;font-size:1rem;font-weight:900;
  color:var(--gold-l);text-align:center;margin-bottom:1.2rem;
}
.field{margin-bottom:.9rem;}
.field label{display:block;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.35rem;}
.field input,.field select{
  width:100%;padding:.6rem .85rem;background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.3);border-radius:4px;
  color:var(--text);font-family:'IM Fell English',serif;font-size:.92rem;
  outline:none;-webkit-appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field select option{background:#1a0e04;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.modal-actions{display:flex;gap:.7rem;margin-top:1rem;}
.modal-actions .btn-action{flex:1;}

.msg{padding:.55rem .85rem;border-radius:4px;font-size:.75rem;margin-bottom:.8rem;font-family:'Cinzel',serif;display:none;}
.msg.error{background:rgba(180,20,20,.15);border:1px solid rgba(180,60,60,.4);color:#f08080;}
.msg.success{background:rgba(20,100,20,.15);border:1px solid rgba(60,160,60,.4);color:#80d080;}
.msg.show{display:block;}

@keyframes sweep{from{background-position:0% 50%}to{background-position:200% 50%}}
@keyframes revealUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="../assets/gif/vide-de-fundo.mp4" type="video/mp4">
</video>

<div class="page">
  <div class="top-nav">
    <button class="nav-btn" onclick="window.location.href='../index.html'">⬅ Biblioteca</button>
    <button class="nav-btn" id="btn-admin" style="display:none" onclick="window.location.href='admin.html'">⚜ Painel Admin</button>
    <button class="nav-btn danger" onclick="doLogout()">Sair</button>
  </div>

  <div class="pergaminho" id="pergaminho">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="avatar-section">
      <div class="avatar-ring" id="avatar-ring">
        <span id="avatar-crown" class="crown" style="display:none">👑</span>
        <img id="avatar-img" style="display:none" alt="Avatar"/>
        <span id="avatar-initials">…</span>
      </div>
      <div id="badge-admin" class="badge-admin" style="display:none">⚜ MAGO SUPREMO ⚜</div>
      <div id="badge-aluno" class="badge-aluno" style="display:none">ESCUDEIRO DO CONHECIMENTO</div>
    </div>

    <h2 class="profile-name" id="profile-name">Carregando…</h2>

    <div class="divider"><span>✦</span></div>

    <div class="info-grid">
      <div class="info-box">
        <div class="info-label">SÉRIE</div>
        <div class="info-value" id="info-serie">—</div>
      </div>
      <div class="info-box">
        <div class="info-label">TURMA</div>
        <div class="info-value" id="info-turma">—</div>
      </div>
      <div class="info-box">
        <div class="info-label">Nº CHAMADA</div>
        <div class="info-value" id="info-numero">—</div>
      </div>
      <div class="info-box">
        <div class="info-label">MEMBRO DESDE</div>
        <div class="info-value" id="info-data">—</div>
      </div>
    </div>

    <div class="actions" id="actions-section"></div>
  </div>
</div>

<!-- Modal de edição -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box">
    <div class="modal-title">Editar Pergaminho</div>
    <div id="msg-edit" class="msg error"></div>
    <div class="field">
      <label>NOME COMPLETO</label>
      <input id="edit-nome" type="text"/>
    </div>
    <div class="row2">
      <div class="field">
        <label>SÉRIE</label>
        <select id="edit-serie">
          <option value="">—</option>
          <option value="1ª Série">1ª Série</option>
          <option value="2ª Série">2ª Série</option>
          <option value="3ª Série">3ª Série</option>
        </select>
      </div>
      <div class="field">
        <label>TURMA</label>
        <input id="edit-turma" type="text" placeholder="A, B, C…"/>
      </div>
    </div>
    <div class="field">
      <label>Nº CHAMADA</label>
      <input id="edit-numero" type="number" min="1" max="60"/>
    </div>
    <div class="modal-actions">
      <button class="btn-action btn-outline" onclick="closeModal()">CANCELAR</button>
      <button class="btn-action btn-gold" id="btn-save-edit" onclick="saveEdit()">SALVAR</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

let viewingId = null;
let currentUser = null;
let currentProfile = null;

(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  currentUser = session.user;

  // Pode ver perfil de outro aluno via ?id=UUID
  const params = new URLSearchParams(location.search);
  viewingId = params.get('id') || currentUser.id;

  await loadProfile(viewingId);
})();

async function loadProfile(uid) {
  const { data: profile, error } = await db.from('profiles').select('*').eq('id', uid).single();
  if (error || !profile) {
    document.getElementById('profile-name').textContent = 'Perfil não encontrado';
    return;
  }

  const { data: myProfile } = await db.from('profiles').select('role').eq('id', currentUser.id).single();
  const isAdmin  = myProfile?.role === 'admin';
  const isOwner  = uid === currentUser.id;

  currentProfile = profile;

  // Avatar
  if (profile.avatar_url) {
    document.getElementById('avatar-img').src = profile.avatar_url;
    document.getElementById('avatar-img').style.display = 'block';
    document.getElementById('avatar-initials').style.display = 'none';
  } else {
    const parts = profile.nome_completo.split(' ').filter(Boolean);
    const ini = parts.length >= 2 ? parts[0][0]+parts[parts.length-1][0] : parts[0]?.[0] || '?';
    document.getElementById('avatar-initials').textContent = ini.toUpperCase();
  }

  // Badge
  if (profile.role === 'admin') {
    document.getElementById('avatar-crown').style.display = 'block';
    document.getElementById('badge-admin').style.display = 'block';
  } else {
    document.getElementById('badge-aluno').style.display = 'block';
  }

  document.getElementById('profile-name').textContent = profile.nome_completo || '(sem nome)';
  document.getElementById('info-serie').textContent  = profile.serie     || '—';
  document.getElementById('info-turma').textContent  = profile.turma     || '—';
  document.getElementById('info-numero').textContent = profile.numero_chamada ?? '—';
  document.getElementById('info-data').textContent   = profile.created_at
    ? new Date(profile.created_at).toLocaleDateString('pt-BR', {month:'short',year:'numeric'})
    : '—';

  // Botão admin
  if (isAdmin) document.getElementById('btn-admin').style.display = 'block';

  // Ações
  const actions = document.getElementById('actions-section');
  if (isOwner || isAdmin) {
    actions.innerHTML = `<button class="btn-action btn-gold" onclick="openModal()">✏ EDITAR PERGAMINHO</button>`;
  }
  if (isAdmin && !isOwner) {
    actions.innerHTML += `<button class="btn-action btn-red" onclick="confirmarDelete()">🗑 Remover Aluno</button>`;
  }
}

function openModal() {
  document.getElementById('edit-nome').value   = currentProfile.nome_completo || '';
  document.getElementById('edit-serie').value  = currentProfile.serie || '';
  document.getElementById('edit-turma').value  = currentProfile.turma || '';
  document.getElementById('edit-numero').value = currentProfile.numero_chamada || '';
  document.getElementById('modal-edit').classList.add('open');
}
function closeModal() { document.getElementById('modal-edit').classList.remove('open'); }

async function saveEdit() {
  const nome   = document.getElementById('edit-nome').value.trim();
  const serie  = document.getElementById('edit-serie').value;
  const turma  = document.getElementById('edit-turma').value.trim();
  const numero = parseInt(document.getElementById('edit-numero').value) || null;
  const btn    = document.getElementById('btn-save-edit');
  const msg    = document.getElementById('msg-edit');
  if (!nome) { msg.textContent='Nome obrigatório.'; msg.className='msg error show'; return; }
  msg.className='msg'; btn.disabled=true; btn.textContent='Salvando…';
  const { error } = await db.from('profiles').update({
    nome_completo: nome, serie: serie||null, turma: turma||null, numero_chamada: numero
  }).eq('id', viewingId);
  if (error) {
    msg.textContent = error.message; msg.className='msg error show';
    btn.disabled=false; btn.textContent='SALVAR';
  } else {
    closeModal();
    await loadProfile(viewingId);
  }
}

async function confirmarDelete() {
  if (!confirm('Remover este aluno permanentemente?')) return;
  await db.from('profiles').delete().eq('id', viewingId);
  await db.auth.admin?.deleteUser(viewingId).catch(()=>{});
  window.location.href = 'admin.html';
}

async function doLogout() {
  await db.auth.signOut();
  window.location.href = '../index.html';
}

document.getElementById('modal-edit').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-edit')) closeModal();
});
</script>
</body>
</html>
