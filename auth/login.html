<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Acesso ao Sanctum — Biblioteca Digital Medieval</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d060;--gold-b:#ffe87a;
  --ember:#ff6a1a;--text:#f5e8c0;--text-m:#c9a870;--text-d:#7a5c30;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'IM Fell English',serif;background:#080300;color:var(--text);}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;overflow-y:auto;}

#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;}

.sanctum-wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  animation:revealUp .6s ease-out both;
}

/* ── Scroll/pergaminho ── */
.scroll{
  background:linear-gradient(160deg,#1e1004,#130a02,#1c0e05);
  border:2px solid var(--gold);
  border-radius:8px;
  padding:2rem 1.8rem 1.8rem;
  position:relative;
  box-shadow:0 0 60px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.8);
  overflow:hidden;
}
.scroll::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-b),transparent);
  background-size:200% 100%;animation:sweep 2.5s linear infinite;
}
.scroll-corner{position:absolute;width:20px;height:20px;border-color:rgba(201,168,76,.55);}
.scroll-corner.tl{top:8px;left:8px;border-top:2px solid;border-left:2px solid;}
.scroll-corner.tr{top:8px;right:8px;border-top:2px solid;border-right:2px solid;}
.scroll-corner.bl{bottom:8px;left:8px;border-bottom:2px solid;border-left:2px solid;}
.scroll-corner.br{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid;}

.scroll-title{
  font-family:'Cinzel Decorative',serif;font-weight:900;
  font-size:clamp(1rem,5vw,1.3rem);letter-spacing:.06em;
  background:linear-gradient(135deg,#f9e3a0,#f2c25c,#b98b28);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:.3rem;
}
.scroll-sub{
  font-family:'UnifrakturMaguntia',serif;font-size:clamp(.85rem,3.5vw,1rem);
  color:var(--text-m);text-align:center;margin-bottom:1.4rem;
  letter-spacing:.03em;
}
.divider{display:flex;align-items:center;gap:8px;margin:0 auto 1.2rem;max-width:200px;color:var(--gold);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* ── Tabs ── */
.tabs{display:flex;gap:0;margin-bottom:1.4rem;border-bottom:1px solid rgba(201,168,76,.25);}
.tab{
  flex:1;padding:.6rem;text-align:center;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.7rem;letter-spacing:.12em;
  color:#6a4a20;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;background:none;border-top:none;border-left:none;border-right:none;
}
.tab.active{color:var(--gold-l);border-bottom-color:var(--gold);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── Form fields ── */
.field{margin-bottom:1rem;}
.field label{
  display:block;font-family:'Cinzel',serif;font-size:.62rem;
  letter-spacing:.14em;color:var(--text-d);margin-bottom:.4rem;
}
.field input,.field select{
  width:100%;padding:.65rem .9rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.3);
  border-radius:4px;color:var(--text);
  font-family:'IM Fell English',serif;font-size:.95rem;
  transition:border-color .2s,box-shadow .2s;outline:none;
  -webkit-appearance:none;appearance:none;
}
.field input:focus,.field select:focus{
  border-color:var(--gold);
  box-shadow:0 0 12px rgba(201,168,76,.2);
}
.field input::placeholder{color:rgba(245,232,192,.25);}
.field select option{background:#1a0e04;color:var(--text);}

/* ── Buttons ── */
.btn-primary{
  width:100%;padding:.75rem;border:none;border-radius:4px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.78rem;letter-spacing:.12em;
  background:linear-gradient(135deg,#c9a84c,#f0d060,#8a6414);
  color:#1a0800;
  box-shadow:0 2px 12px rgba(201,168,76,.35);
  transition:transform .15s,box-shadow .15s,opacity .15s;
  margin-top:.4rem;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,76,.55);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.btn-ghost{
  background:none;border:none;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;
  color:var(--text-d);text-decoration:underline;
  transition:color .2s;padding:0;
}
.btn-ghost:hover{color:var(--gold-l);}

.row-link{text-align:center;margin-top:.9rem;font-size:.78rem;color:var(--text-d);}
.row-link button{margin-left:4px;}

/* ── Mensagens ── */
.msg{
  padding:.6rem .9rem;border-radius:4px;
  font-size:.8rem;margin-bottom:.9rem;
  font-family:'Cinzel',serif;letter-spacing:.05em;
  display:none;
}
.msg.error{background:rgba(180,20,20,.15);border:1px solid rgba(180,60,60,.4);color:#f08080;}
.msg.success{background:rgba(20,100,20,.15);border:1px solid rgba(60,160,60,.4);color:#80d080;}
.msg.show{display:block;}

/* ── Back link ── */
.back-link{
  text-align:center;margin-top:1.1rem;
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;color:var(--text-d);
}
.back-link a{color:var(--text-d);text-decoration:none;transition:color .2s;}
.back-link a:hover{color:var(--gold-l);}

/* ── Visitante ── */
.visitor-separator{
  display:flex;align-items:center;gap:8px;
  margin:1.3rem 0 .9rem;
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;color:var(--text-d);
}
.visitor-separator::before,.visitor-separator::after{
  content:'';flex:1;height:1px;background:rgba(201,168,76,.15);
}
.btn-visitor{
  width:100%;padding:.65rem;border:1px solid rgba(201,168,76,.25);border-radius:4px;
  background:rgba(255,255,255,.03);cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.72rem;letter-spacing:.1em;
  color:var(--text-d);transition:all .2s;
}
.btn-visitor:hover{
  border-color:rgba(201,168,76,.5);color:var(--text-m);
  background:rgba(201,168,76,.07);
}

@keyframes sweep{from{background-position:0% 50%}to{background-position:200% 50%}}
@keyframes revealUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="../assets/gif/vide-de-fundo.mp4" type="video/mp4">
</video>

<div class="sanctum-wrap">
  <div class="scroll">
    <div class="scroll-corner tl"></div><div class="scroll-corner tr"></div>
    <div class="scroll-corner bl"></div><div class="scroll-corner br"></div>

    <h1 class="scroll-title">Sanctum Codex</h1>
    <p class="scroll-sub">Acesso ao Acervo Sagrado</p>
    <div class="divider"><span>✦</span></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">ENTRAR</button>
      <button class="tab" onclick="switchTab('register')">CRIAR CONTA</button>
    </div>

    <!-- ── LOGIN ── -->
    <div id="tab-login" class="tab-panel active">
      <div id="msg-login" class="msg"></div>
      <div class="field">
        <label>PERGAMINHO DE IDENTIFICAÇÃO (E-MAIL)</label>
        <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>SENHA SECRETA</label>
        <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">⚔ ADENTRAR O SANCTUM</button>
      <div class="row-link">
        <button class="btn-ghost" onclick="showForgot()">Esqueci minha senha</button>
      </div>
    </div>

    <!-- ── REGISTER ── -->
    <div id="tab-register" class="tab-panel">
      <div id="msg-register" class="msg"></div>
      <div class="field">
        <label>NOME COMPLETO</label>
        <input id="reg-nome" type="text" placeholder="Seu nome completo" autocomplete="name"/>
      </div>
      <div class="field">
        <label>E-MAIL</label>
        <input id="reg-email" type="email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>SÉRIE</label>
        <select id="reg-serie">
          <option value="">— Selecione sua série —</option>
          <option value="1ª Série">1ª Série</option>
          <option value="2ª Série">2ª Série</option>
          <option value="3ª Série">3ª Série</option>
        </select>
      </div>
      <div class="field">
        <label>SENHA (mínimo 6 caracteres)</label>
        <input id="reg-pass" type="password" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">📜 SELAR O PERGAMINHO</button>
    </div>

    <!-- ── FORGOT PASSWORD ── -->
    <div id="tab-forgot" class="tab-panel">
      <div id="msg-forgot" class="msg"></div>
      <p style="font-size:.82rem;color:var(--text-m);margin-bottom:1rem;line-height:1.5;">
        Digite seu e-mail para receber o feitiço de recuperação de senha.
      </p>
      <div class="field">
        <label>E-MAIL</label>
        <input id="forgot-email" type="email" placeholder="seu@email.com"/>
      </div>
      <button class="btn-primary" id="btn-forgot" onclick="doForgot()">✉ ENVIAR FEITIÇO</button>
      <div class="row-link">
        <button class="btn-ghost" onclick="switchTab('login')">← Voltar ao login</button>
      </div>
    </div>
  </div>

  <div class="scroll" style="margin-top:.8rem;padding:1.2rem 1.8rem;">
    <div class="visitor-separator">ou</div>
    <button class="btn-visitor" onclick="entrarComoVisitante()">
      👁 CONTINUAR COMO VISITANTE
    </button>
    <p style="text-align:center;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;color:var(--text-d);margin-top:.6rem;line-height:1.6;">
      Acesse os conteúdos sem cadastro.<br>Sem perfil salvo.
    </p>
  </div>

  <div class="back-link">
    <a href="../index.html">← Voltar à Biblioteca</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

// Redireciona se já logado
db.auth.getSession().then(({ data: { session } }) => {
  if (session) redirectAfterLogin(session.user);
});

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['login','register','forgot'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'forgot') {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  }
}

function showForgot() { switchTab('forgot'); }

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}

async function redirectAfterLogin(user) {
  try {
    const { data: profile, error } = await db.from('profiles').select('nome_completo,role').eq('id', user.id).single();
    if (error) throw error;
    if (profile?.role === 'admin') {
      window.location.href = 'admin.html';
    } else if (!profile?.nome_completo) {
      window.location.href = 'cadastro.html';
    } else {
      window.location.href = '../index.html?intro=1';
    }
  } catch(e) {
    // Tabela profiles não existe ainda ou erro de schema — redireciona para cadastro
    if (user.email === window.ADMIN_EMAIL) {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'cadastro.html';
    }
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('btn-login');
  if (!email || !pass) { showMsg('msg-login','Preencha todos os campos.','error'); return; }
  btn.disabled = true; btn.textContent = 'Abrindo o portal…';
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) {
    const msgs = {
      'Invalid login credentials': 'E-mail ou senha incorretos.',
      'Email not confirmed': 'Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada.',
    };
    showMsg('msg-login', msgs[error.message] || error.message, 'error');
    btn.disabled = false; btn.textContent = '⚔ ADENTRAR O SANCTUM';
  } else {
    await redirectAfterLogin(data.user);
  }
}

async function doRegister() {
  const nome  = document.getElementById('reg-nome').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const serie = document.getElementById('reg-serie').value;
  const pass  = document.getElementById('reg-pass').value;
  const btn   = document.getElementById('btn-register');
  if (!nome || !email || !serie || !pass) { showMsg('msg-register','Preencha todos os campos.','error'); return; }
  if (pass.length < 6) { showMsg('msg-register','A senha deve ter ao menos 6 caracteres.','error'); return; }
  btn.disabled = true; btn.textContent = 'Selando…';
  const { error } = await db.auth.signUp({
    email, password: pass,
    options: { data: { nome_completo: nome, serie } }
  });
  if (error) {
    showMsg('msg-register', error.message, 'error');
    btn.disabled = false; btn.textContent = '📜 SELAR O PERGAMINHO';
  } else {
    showMsg('msg-register',
      'Pergaminho selado! Verifique seu e-mail para confirmar o cadastro.',
      'success');
    btn.disabled = false; btn.textContent = '📜 SELAR O PERGAMINHO';
  }
}

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  const btn   = document.getElementById('btn-forgot');
  if (!email) { showMsg('msg-forgot','Digite seu e-mail.','error'); return; }
  btn.disabled = true; btn.textContent = 'Enviando…';
  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/auth/login.html'
  });
  if (error) {
    showMsg('msg-forgot', error.message, 'error');
  } else {
    showMsg('msg-forgot', 'Feitiço enviado! Verifique seu e-mail.', 'success');
  }
  btn.disabled = false; btn.textContent = '✉ ENVIAR FEITIÇO';
}

// Enter para submeter
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.tab-panel.active')?.id;
  if (active === 'tab-login') doLogin();
  else if (active === 'tab-register') doRegister();
  else if (active === 'tab-forgot') doForgot();
});

// Checa se veio de confirmação de email
const params = new URLSearchParams(location.search);
if (params.get('confirmed')) {
  switchTab('login');
  showMsg('msg-login','E-mail confirmado! Faça login para continuar.','success');
}

function entrarComoVisitante() {
  sessionStorage.setItem('bdm-visitante', '1');
  window.location.href = '../index.html';
}
</script>
</body>
</html>
