<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Meu Pergaminho — Biblioteca Digital Medieval</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d060;--gold-b:#ffe87a;
  --ember:#ff6a1a;--text:#f5e8c0;--text-m:#c9a870;--text-d:#7a5c30;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'IM Fell English',serif;background:#080300;color:var(--text);}
body{display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 60px;overflow-y:auto;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.35;pointer-events:none;}

.page{position:relative;z-index:1;width:100%;max-width:440px;animation:revealUp .5s ease-out both;}

/* nav */
.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;}
.nav-btn{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;font-weight:700;
  background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));
  border:1px solid rgba(201,168,76,.4);color:var(--gold-l);
  border-radius:4px;padding:6px 14px;cursor:pointer;transition:all .2s;
}
.nav-btn:hover{background:rgba(201,168,76,.25);}
.nav-btn.danger{border-color:rgba(180,60,60,.4);color:#f08080;background:rgba(180,20,20,.08);}
.nav-btn.danger:hover{background:rgba(180,20,20,.18);}

/* pergaminho */
.pergaminho{
  background:linear-gradient(160deg,#1e1004,#130a02,#1c0e05);
  border:2px solid var(--gold);border-radius:8px;
  padding:2rem 1.6rem;position:relative;
  box-shadow:0 0 60px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.8);
  margin-bottom:1rem;
}
.pergaminho::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-b),transparent);
  background-size:200% 100%;animation:sweep 2.5s linear infinite;
}
.corner{position:absolute;width:20px;height:20px;border-color:rgba(201,168,76,.55);}
.corner.tl{top:8px;left:8px;border-top:2px solid;border-left:2px solid;}
.corner.tr{top:8px;right:8px;border-top:2px solid;border-right:2px solid;}
.corner.bl{bottom:8px;left:8px;border-bottom:2px solid;border-left:2px solid;}
.corner.br{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid;}

/* avatar */
.avatar-section{display:flex;flex-direction:column;align-items:center;margin-bottom:1.4rem;}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:.8rem;cursor:pointer;}
.avatar-ring{
  width:110px;height:110px;border-radius:50%;
  border:3px solid var(--gold);
  background:linear-gradient(135deg,#2a1400,#1a0a00);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',serif;font-size:2.2rem;
  color:var(--gold-l);overflow:hidden;position:relative;
}
.avatar-ring img{width:100%;height:100%;object-fit:cover;}
.avatar-frame-img{
  position:absolute;inset:-14px;
  width:calc(100% + 28px);height:calc(100% + 28px);
  pointer-events:none;z-index:10;object-fit:contain;
}
.frame-nivel-1{border-color:#a09878;}
.frame-nivel-2{border-color:#c9a84c;}
.frame-nivel-3{border-color:#4fc3f7;}
.frame-nivel-4{border-color:#c084fc;}
.frame-nivel-5{border-color:#ff6a1a;}

.avatar-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,.55);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  opacity:0;transition:opacity .2s;z-index:20;
}
.avatar-wrap:hover .avatar-overlay{opacity:1;}
.avatar-wrap:active .avatar-overlay{opacity:1;}
.avatar-overlay-icon{font-size:1.3rem;}
.avatar-overlay-txt{font-family:'Cinzel',serif;font-size:.45rem;letter-spacing:.1em;color:#fff;}

.btn-foto{
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.1em;font-weight:700;
  border:1px solid rgba(201,168,76,.35);border-radius:20px;
  padding:4px 14px;background:rgba(201,168,76,.08);color:var(--gold-l);
  cursor:pointer;transition:all .2s;margin-top:.3rem;
}
.btn-foto:hover{background:rgba(201,168,76,.2);}

/* level */
.nivel-badge{
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.14em;font-weight:700;
  border-radius:12px;padding:3px 12px;margin-bottom:.2rem;text-align:center;
}
.nivel-badge-0{color:#4a4040;border:1px solid rgba(74,64,64,.4);}
.nivel-badge-1{color:#a09878;border:1px solid rgba(160,152,120,.4);}
.nivel-badge-2{color:var(--gold-l);border:1px solid rgba(201,168,76,.5);}
.nivel-badge-3{color:#4fc3f7;border:1px solid rgba(79,195,247,.5);background:rgba(79,195,247,.05);}
.nivel-badge-4{color:#c084fc;border:1px solid rgba(192,132,252,.5);background:rgba(192,132,252,.05);}
.nivel-badge-5{color:var(--ember);border:1px solid rgba(255,106,26,.55);background:rgba(255,106,26,.07);text-shadow:0 0 10px rgba(255,106,26,.5);}
.nivel-stars{font-size:1rem;letter-spacing:.22em;margin-bottom:.3rem;text-shadow:0 0 6px currentColor;}

/* profile name */
.profile-name{
  font-family:'Cinzel Decorative',serif;font-weight:700;
  font-size:clamp(1rem,5vw,1.25rem);letter-spacing:.04em;
  background:linear-gradient(135deg,#f9e3a0,#f2c25c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:.9rem;line-height:1.3;
}

/* info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.2rem;}
.info-box{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);
  border-radius:5px;padding:.7rem;text-align:center;
}
.info-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.14em;color:var(--text-d);margin-bottom:.25rem;}
.info-value{font-size:.9rem;color:var(--text-m);}

/* level bar */
.level-bar-wrap{
  background:rgba(0,0,0,.35);border-radius:20px;height:8px;overflow:hidden;
  border:1px solid rgba(201,168,76,.2);margin-top:.4rem;
}
.level-bar-fill{
  height:100%;border-radius:20px;
  background:linear-gradient(90deg,#8a6414,#c9a84c,#ffe87a);
  background-size:200% 100%;animation:sweep 2s linear infinite;
  box-shadow:0 0 6px rgba(255,220,80,.5);
  transition:width .6s ease;
}

/* quiz */
.quiz-section{margin-top:.6rem;}
.quiz-title{
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.18em;font-weight:700;
  color:var(--gold-l);text-align:center;margin-bottom:.7rem;
  display:flex;align-items:center;gap:8px;
}
.quiz-title::before,.quiz-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.quiz-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;}
.quiz-stat{
  background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);
  border-radius:5px;padding:.6rem .4rem;text-align:center;
}
.quiz-stat-val{font-size:1.1rem;font-weight:700;color:var(--gold-l);font-family:'Cinzel',serif;}
.quiz-stat-lbl{font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.12em;color:var(--text-d);margin-top:.2rem;}

/* loading */
.loading-state{text-align:center;padding:4rem 1rem;}
.loading-rune{font-family:'UnifrakturMaguntia',cursive;font-size:3rem;color:var(--gold);animation:spin 2s linear infinite;display:inline-block;}

/* ── Modal de recorte ── */
.crop-modal{
  display:none;position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,.92);
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:16px;overflow-y:auto;
}
.crop-modal.open{display:flex;}
.crop-header{
  width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.crop-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.12em;color:var(--gold-l);}
.crop-close{
  background:none;border:1px solid rgba(201,168,76,.3);color:var(--gold-l);
  border-radius:4px;padding:4px 12px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;
}
.crop-container{
  width:100%;max-width:500px;background:#1a0a00;border-radius:8px;
  border:1px solid rgba(201,168,76,.25);overflow:hidden;
  max-height:55vh;display:flex;align-items:center;justify-content:center;
}
.crop-container img{max-width:100%;display:block;}
.crop-controls{
  width:100%;max-width:500px;margin-top:12px;
  display:flex;flex-direction:column;gap:10px;
}
.crop-zoom-row{
  display:flex;align-items:center;gap:10px;
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.08em;color:var(--text-d);
}
.crop-zoom-row input[type=range]{
  flex:1;height:4px;accent-color:var(--gold);
}
.crop-actions{display:flex;gap:10px;}
.btn-crop-confirm{
  flex:1;padding:.7rem;border:none;border-radius:4px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.72rem;letter-spacing:.12em;
  background:linear-gradient(135deg,#c9a84c,#f0d060,#8a6414);color:#1a0800;
  transition:transform .15s,box-shadow .15s;
}
.btn-crop-confirm:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,.4);}
.btn-crop-confirm:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-crop-cancel{
  padding:.7rem 1.2rem;border-radius:4px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;
  background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);color:var(--text-d);
  transition:all .2s;
}
.btn-crop-cancel:hover{color:var(--gold-l);border-color:rgba(201,168,76,.4);}

/* crop tip */
.crop-tip{
  font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.07em;color:var(--text-d);
  text-align:center;padding:.4rem;line-height:1.7;
}

/* upload spinner */
.upload-spinner{
  display:none;width:20px;height:20px;border:2px solid rgba(201,168,76,.3);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;
  margin:0 auto;
}
.upload-spinner.show{display:block;}

/* toast */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(10,5,0,.92);border:1px solid rgba(201,168,76,.4);
  border-radius:6px;padding:.6rem 1.4rem;
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;color:var(--gold-l);
  z-index:9999;transition:transform .3s ease;pointer-events:none;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sweep{from{background-position:0% 50%}to{background-position:200% 50%}}
@keyframes revealUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="../assets/video/medieval-bg.mp4" type="video/mp4"/>
</video>

<div id="toast"></div>

<!-- Modal de recorte de foto -->
<div class="crop-modal" id="crop-modal">
  <div class="crop-header">
    <span class="crop-title">⚜ AJUSTAR FOTO DE PERFIL</span>
    <button class="crop-close" onclick="closeCrop()">✕ CANCELAR</button>
  </div>
  <div class="crop-container">
    <img id="crop-img" src="" alt="foto"/>
  </div>
  <div class="crop-controls">
    <p class="crop-tip">Arraste para posicionar · Pinçe ou use o controle abaixo para aproximar</p>
    <div class="crop-zoom-row">
      <span>−</span>
      <input type="range" id="crop-zoom" min="0" max="1" step="0.01" value="0" oninput="setZoom(this.value)"/>
      <span>+</span>
    </div>
    <div class="crop-actions">
      <button class="btn-crop-cancel" onclick="closeCrop()">CANCELAR</button>
      <button class="btn-crop-confirm" id="btn-confirmar-crop" onclick="confirmarFoto()">
        ✔ SALVAR FOTO
      </button>
    </div>
    <div class="upload-spinner" id="upload-spinner"></div>
  </div>
</div>

<div class="page">
  <nav class="top-nav">
    <button class="nav-btn" onclick="history.back()">← VOLTAR</button>
    <span style="font-family:'UnifrakturMaguntia',cursive;font-size:1.1rem;color:var(--gold-l);opacity:.7">Meu Perfil</span>
    <button class="nav-btn danger" onclick="doLogout()">↩ SAIR</button>
  </nav>

  <div id="main-content">
    <div class="loading-state"><div class="loading-rune">⚜</div></div>
  </div>
</div>

<!-- input de arquivo oculto -->
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="onFileSelect(event)"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/nivel.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
(async function () {
  if (!window.SUPABASE_URL || window.SUPABASE_URL === 'SUA_URL_AQUI') return;
  const { createClient } = supabase;
  const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

  /* ── Verifica sessão custom-auth ── */
  const alunoSession = JSON.parse(localStorage.getItem('bdm-aluno') || 'null');
  if (!alunoSession || !alunoSession.id) {
    window.location.href = 'login.html'; return;
  }
  const alunoId = alunoSession.id;
  const main = document.getElementById('main-content');

  /* ── Carrega dados ── */
  const [alunoRes, rankRes, quizRes] = await Promise.all([
    db.rpc('get_aluno_public', { p_id: alunoId }),
    db.from('ranking_all').select('pontos,nivel').eq('id', alunoId).maybeSingle(),
    db.from('quiz_results').select('correct,total,submitted_at').eq('user_id', alunoId)
  ]);

  const profileData = alunoRes.data?.[0] || null;
  if (!profileData) {
    main.innerHTML = '<div style="text-align:center;padding:3rem;font-family:Cinzel,serif;color:#7a5c30">Perfil não encontrado</div>';
    return;
  }

  let currentAvatarUrl = profileData.avatar_url || null;
  const nivel  = rankRes.data?.nivel  || 0;
  const pontos = rankRes.data?.pontos || 0;
  const info   = window.getNivelInfo(nivel);
  const stars  = window.getNivelStars(nivel);
  const prog   = window.getNivelProgress(nivel, pontos);
  const proxTxt= window.getNivelProxTxt(nivel, pontos);

  const nome   = profileData.nome_completo || alunoSession.nome_completo || '—';
  const parts  = nome.split(' ').filter(Boolean);
  const initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : (parts[0] ? parts[0][0].toUpperCase() : '?');

  const quizzes      = quizRes.data || [];
  const totalQuizzes = quizzes.length;
  const totalCorrect = quizzes.reduce((s,q)=>s+q.correct,0);
  const totalQuest   = quizzes.reduce((s,q)=>s+q.total,0);
  const accuracy     = totalQuest > 0 ? Math.round(totalCorrect/totalQuest*100) : 0;

  const frameUrl = nivel > 0 ? '../assets/images/frames/frame-nivel-' + nivel + '.png' : '';

  function avatarInnerHtml(url) {
    return url
      ? '<img id="avatar-img" src="' + url + '" alt="' + nome + '">'
      : '<span id="avatar-initials">' + initials + '</span>';
  }

  main.innerHTML = `
    <div class="pergaminho">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="avatar-section">
        <div class="avatar-wrap" id="avatar-wrap" onclick="document.getElementById('file-input').click()" title="Alterar foto">
          <div class="avatar-ring frame-nivel-${nivel}" id="avatar-ring">${avatarInnerHtml(currentAvatarUrl)}</div>
          ${frameUrl ? '<img class="avatar-frame-img" src="' + frameUrl + '" alt="" id="frame-img">' : ''}
          <div class="avatar-overlay">
            <span class="avatar-overlay-icon">📷</span>
            <span class="avatar-overlay-txt">ALTERAR FOTO</span>
          </div>
        </div>
        <button class="btn-foto" onclick="document.getElementById('file-input').click()">📷 Alterar foto de perfil</button>
        <div class="nivel-badge nivel-badge-${nivel}" style="margin-top:.5rem">${info.nome.toUpperCase()}</div>
        <div class="nivel-stars" style="color:${info.cor}">${stars}</div>
      </div>

      <div class="profile-name">${nome}</div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">SÉRIE</div>
          <div class="info-value" style="font-size:.85rem">${profileData.serie || alunoSession.serie || '—'}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Nº CHAMADA</div>
          <div class="info-value" style="font-size:.85rem">${profileData.numero_chamada || alunoSession.numero_chamada || '—'}</div>
        </div>
        <div class="info-box">
          <div class="info-label">PONTUAÇÃO</div>
          <div class="info-value" style="color:var(--gold-b)">${pontos} pts</div>
        </div>
        <div class="info-box">
          <div class="info-label">NÍVEL</div>
          <div class="info-value" style="color:${info.cor}">${nivel} / 5</div>
        </div>
      </div>

      <div style="margin-bottom:1.1rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem">
          <span style="font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.12em;color:var(--text-d)">PROGRESSO</span>
          <span style="font-family:'Cinzel',serif;font-size:.5rem;color:var(--text-d)">${nivel < 5 ? proxTxt : '⚜ NÍVEL MÁXIMO ⚜'}</span>
        </div>
        <div class="level-bar-wrap">
          <div class="level-bar-fill" id="level-bar" style="width:${prog}%"></div>
        </div>
      </div>

      <div class="quiz-section">
        <div class="quiz-title">DESEMPENHO NOS QUIZZES</div>
        <div class="quiz-grid">
          <div class="quiz-stat">
            <div class="quiz-stat-val">${totalQuizzes}</div>
            <div class="quiz-stat-lbl">QUIZZES</div>
          </div>
          <div class="quiz-stat">
            <div class="quiz-stat-val">${totalCorrect}</div>
            <div class="quiz-stat-lbl">ACERTOS</div>
          </div>
          <div class="quiz-stat">
            <div class="quiz-stat-val">${accuracy}%</div>
            <div class="quiz-stat-lbl">PRECISÃO</div>
          </div>
        </div>
      </div>
    </div>
  `;

  /* ── Logout ── */
  window.doLogout = function () {
    localStorage.removeItem('bdm-aluno');
    sessionStorage.removeItem('bdm-nav');
    window.location.href = '../index.html';
  };

  /* ── Toast ── */
  function showToast(msg, duration) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration || 2800);
  }

  /* ── Cropper ── */
  let cropperInstance = null;

  window.onFileSelect = function (event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('Imagem muito grande (máx 5 MB)'); event.target.value = ''; return; }

    const reader = new FileReader();
    reader.onload = function (e) {
      const cropImg = document.getElementById('crop-img');
      cropImg.src = e.target.result;

      // Abre o modal
      document.getElementById('crop-modal').classList.add('open');
      document.getElementById('crop-zoom').value = 0;
      document.getElementById('btn-confirmar-crop').disabled = false;

      // Destroi instância anterior se existir
      if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }

      // Cria nova instância do Cropper
      cropperInstance = new Cropper(cropImg, {
        aspectRatio: 1,
        viewMode: 2,
        dragMode: 'move',
        autoCropArea: 0.85,
        cropBoxResizable: false,
        cropBoxMovable: false,
        toggleDragModeOnDblclick: false,
        ready: function () {
          document.getElementById('crop-zoom').value = 0;
        }
      });
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  };

  window.setZoom = function (val) {
    if (!cropperInstance) return;
    cropperInstance.zoomTo(parseFloat(val) * 3 + 0.5);
  };

  window.closeCrop = function () {
    document.getElementById('crop-modal').classList.remove('open');
    if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
  };

  window.confirmarFoto = async function () {
    if (!cropperInstance) return;
    const btn = document.getElementById('btn-confirmar-crop');
    const spinner = document.getElementById('upload-spinner');
    btn.disabled = true;
    spinner.classList.add('show');

    try {
      const canvas = cropperInstance.getCroppedCanvas({ width: 400, height: 400, imageSmoothingQuality: 'high' });

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.88));

      const path = 'aluno-' + alunoId + '.jpg';
      const { error: upErr } = await db.storage.from('avatares').upload(path, blob, {
        upsert: true, contentType: 'image/jpeg'
      });
      if (upErr) throw upErr;

      const { data: urlData } = db.storage.from('avatares').getPublicUrl(path);
      const publicUrl = urlData.publicUrl + '?t=' + Date.now();

      // Salva no banco via função SECURITY DEFINER
      const { error: dbErr } = await db.rpc('update_aluno_avatar', {
        p_id: alunoId,
        p_avatar_url: urlData.publicUrl
      });
      if (dbErr) throw dbErr;

      // Atualiza UI
      const ring = document.getElementById('avatar-ring');
      ring.innerHTML = '<img id="avatar-img" src="' + publicUrl + '" alt="avatar">';
      currentAvatarUrl = urlData.publicUrl;

      closeCrop();
      showToast('⚜ Foto de perfil atualizada!');
    } catch (err) {
      console.error(err);
      showToast('Erro ao salvar foto: ' + (err.message || err));
      btn.disabled = false;
    } finally {
      spinner.classList.remove('show');
    }
  };
}());
</script>
</body>
</html>
