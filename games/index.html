<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sala de Jogos — Biblioteca Medieval</title>
  <meta name="theme-color" content="#0d0a06">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:    #c9a84c;
      --gold-l:  #f5d78a;
      --bg:      #0d0a06;
      --panel:   rgba(20,15,8,.93);
      --border:  rgba(201,168,76,.32);
      --text:    #e8dcc8;
      --text-d:  #8a7e6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-image:
        radial-gradient(ellipse 90% 40% at 50% 0%, rgba(201,168,76,.07), transparent),
        radial-gradient(ellipse 60% 30% at 50% 100%, rgba(100,40,0,.12), transparent);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(30,20,8,.8);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .1em;
      text-decoration: none;
      text-transform: uppercase;
      transition: all .2s;
      white-space: nowrap;
    }
    .back-btn:hover {
      border-color: rgba(201,168,76,.7);
      color: var(--gold-l);
      box-shadow: 0 0 14px rgba(201,168,76,.15);
    }

    .page-title {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: clamp(1.1rem, 4.5vw, 1.65rem);
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--gold);
      text-shadow: 0 0 18px rgba(201,168,76,.45);
      text-align: center;
    }

    /* ── Player bar ── */
    .player-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .08em;
      color: var(--text-d);
      border-bottom: 1px solid rgba(201,168,76,.1);
    }
    .player-bar.show { display: flex; }
    .player-bar strong { color: var(--gold); }

    /* ── Main ── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    .section-label {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--text-d);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Games grid ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
      gap: 18px;
    }

    /* ── Game card ── */
    .game-card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      transition: border-color .25s, box-shadow .25s;
    }
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,168,76,.07), transparent 60%);
      pointer-events: none;
    }
    .game-card:hover {
      border-color: rgba(201,168,76,.6);
      box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 20px rgba(201,168,76,.08);
    }

    /* corner decorations */
    .game-card::after {
      content: '';
      position: absolute;
      top: 8px; right: 8px;
      width: 14px; height: 14px;
      border-top: 1.5px solid rgba(201,168,76,.4);
      border-right: 1.5px solid rgba(201,168,76,.4);
    }

    .card-icon {
      font-size: 2.6rem;
      line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.5));
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(.95rem, 3vw, 1.1rem);
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--gold-l);
      line-height: 1.2;
    }

    .card-desc {
      font-size: .82rem;
      color: var(--text-d);
      line-height: 1.5;
      flex: 1;
    }

    /* ── Top score badge ── */
    .card-top {
      display: none;
      align-items: center;
      gap: 6px;
      font-family: 'Cinzel', serif;
      font-size: .68rem;
      letter-spacing: .06em;
      color: var(--text-d);
      padding: 5px 10px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(201,168,76,.15);
      border-radius: 5px;
    }
    .card-top.show { display: flex; }
    .card-top strong { color: var(--gold); }

    /* ── Play button ── */
    .play-btn {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: linear-gradient(180deg, #ffe5a6, #d8a53e 55%, #8d641c);
      border: 1px solid rgba(245,200,106,.75);
      border-radius: 7px;
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #160f03;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: filter .2s, transform .1s;
      box-shadow: 0 6px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.5);
    }
    .play-btn:hover  { filter: brightness(1.1); }
    .play-btn:active { transform: translateY(2px); }

    /* ── Coming soon ── */
    .coming-soon {
      margin-top: 32px;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(138,126,106,.45);
    }

    /* ── Rankings por jogo ── */
    .rankings-section { margin-top: 42px; display: flex; flex-direction: column; gap: 36px; }

    .rank-game-block { display: block; }

    .rank-game-header {
      font-family: 'Cinzel', serif;
      font-size: .66rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--text-d);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rank-game-header::before,
    .rank-game-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .rank-list { display: flex; flex-direction: column; gap: 6px; }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(201,168,76,.1);
      border-radius: 7px;
      transition: border-color .2s;
    }
    .rank-row:hover { border-color: rgba(201,168,76,.25); }
    .rank-row.gold-row  { border-color: rgba(201,168,76,.32); background: rgba(201,168,76,.04); }
    .rank-row.silver-row { border-color: rgba(192,192,192,.2); }
    .rank-row.bronze-row { border-color: rgba(180,130,70,.2); }

    .rank-pos {
      width: 26px;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      color: var(--gold);
      font-weight: 700;
      flex-shrink: 0;
    }

    .rank-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(201,168,76,.35);
      flex-shrink: 0;
      background: rgba(30,20,8,.8);
    }
    .rank-avatar-ph {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,.18);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(30,20,8,.9);
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      color: var(--text-d);
    }

    .rank-info { flex: 1; overflow: hidden; }
    .rank-name {
      font-family: 'Cinzel', serif;
      font-size: .8rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-serie {
      font-size: .64rem;
      color: var(--text-d);
      margin-top: 1px;
    }
    .rank-row.gold-row   .rank-name { color: var(--gold-l); }
    .rank-row.silver-row .rank-name { color: #d4cfc0; }
    .rank-row.bronze-row .rank-name { color: #c4a77a; }

    .rank-score {
      font-family: 'Cinzel', serif;
      font-size: .85rem;
      color: var(--gold);
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: .04em;
    }

    .rank-empty {
      text-align: center;
      color: var(--text-d);
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      padding: 20px;
      border: 1px solid rgba(201,168,76,.08);
      border-radius: 7px;
    }

    @media (max-width: 420px) {
      .header { padding: 16px 12px 12px; }
      .back-btn { font-size: .65rem; padding: 6px 10px; }
      .page-title { font-size: 1rem; padding-left: 80px; }
      .main { padding: 20px 12px 40px; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="../index.html" class="back-btn">← Biblioteca</a>
  <h1 class="page-title">⚔ Sala de Jogos ⚔</h1>
</header>

<div id="player-bar" class="player-bar">
  Aventureiro: <strong id="player-name">—</strong>
</div>

<main class="main">

  <p class="section-label">Jogos disponíveis</p>

  <div class="games-grid" id="games-grid"></div>

  <div id="rankings-section" class="rankings-section"></div>

  <p class="coming-soon">✦ Mais jogos chegando em breve ✦</p>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
/* ── Catálogo de jogos (adicione novos aqui) ─────────────────── */
const GAMES = [
  {
    id:   'ascensao-medieval',
    name: 'Ascensão Medieval',
    icon: '⚔️',
    desc: 'Guia a esfera sagrada pelos 7 mundos medievais. Plataformas, relíquias e criaturas te aguardam na subida.',
    url:  'ascenção-medieval/index.html'
  }
];

/* ── Render cards ─────────────────────────────────────────────── */
const grid = document.getElementById('games-grid');
GAMES.forEach(g => {
  grid.insertAdjacentHTML('beforeend', `
    <div class="game-card" id="card-${g.id}">
      <div class="card-icon">${g.icon}</div>
      <div class="card-name">${g.name}</div>
      <div class="card-desc">${g.desc}</div>
      <div class="card-top" id="top-${g.id}">
        🏆 Recorde: <strong id="top-pts-${g.id}">—</strong>
        por <strong id="top-who-${g.id}">—</strong>
      </div>
      <a href="${g.url}" class="play-btn">⚔ Jogar</a>
    </div>
  `);
});

/* ── Supabase ─────────────────────────────────────────────────── */
(function () {
  if (!window.SUPABASE_URL || window.SUPABASE_URL === 'SUA_URL_AQUI') return;

  const db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

  /* Identifica o jogador logado */
  db.auth.getUser().then(async ({ data: { user } }) => {
    if (!user) return;
    const { data: prof } = await db.from('profiles').select('nome_completo').eq('id', user.id).single();
    if (prof) {
      document.getElementById('player-name').textContent = prof.nome_completo.split(' ')[0];
      document.getElementById('player-bar').classList.add('show');
    }
  });

  /* Carrega top-1 de cada jogo para exibir no card */
  async function loadCardTops() {
    for (const g of GAMES) {
      const { data } = await db
        .from('game_scores')
        .select('score, profiles(nome_completo)')
        .eq('game_id', g.id)
        .order('score', { ascending: false })
        .limit(1);
      if (data?.length) {
        const row = data[0];
        const name = (row.profiles?.nome_completo || '???').split(' ')[0];
        document.getElementById(`top-pts-${g.id}`).textContent = row.score;
        document.getElementById(`top-who-${g.id}`).textContent = name;
        document.getElementById(`top-${g.id}`).classList.add('show');
      }
    }
  }

  /* Carrega ranking de cada jogo com foto e nome do aluno */
  async function loadGameRankings() {
    const section = document.getElementById('rankings-section');
    if (!section) return;
    const medals = ['🥇', '🥈', '🥉'];
    const rowClass = ['gold-row', 'silver-row', 'bronze-row'];

    for (const g of GAMES) {
      const { data } = await db
        .from('game_scores')
        .select('score, profiles(nome_completo, avatar_url, serie)')
        .eq('game_id', g.id)
        .order('score', { ascending: false })
        .limit(10);

      let rowsHtml;
      if (!data?.length) {
        rowsHtml = `<div class="rank-empty">Nenhum aventureiro registrado ainda</div>`;
      } else {
        rowsHtml = data.map((row, i) => {
          const name       = row.profiles?.nome_completo || '???';
          const serie      = row.profiles?.serie || '';
          const avatarUrl  = row.profiles?.avatar_url || '';
          const initial    = name.trim()[0]?.toUpperCase() || '?';
          const pos        = medals[i] || String(i + 1);
          const cls        = rowClass[i] || '';
          const pts        = row.score.toLocaleString('pt-BR');

          const imgTag = avatarUrl
            ? `<img class="rank-avatar" src="${avatarUrl}" alt="${initial}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : '';
          const phStyle = avatarUrl ? 'style="display:none"' : '';
          const placeholder = `<div class="rank-avatar-ph" ${phStyle}>${initial}</div>`;
          const serieHtml   = serie ? `<div class="rank-serie">${serie}</div>` : '';

          return `
            <div class="rank-row ${cls}">
              <span class="rank-pos">${pos}</span>
              ${imgTag}${placeholder}
              <div class="rank-info">
                <div class="rank-name">${name}</div>
                ${serieHtml}
              </div>
              <span class="rank-score">${pts}</span>
            </div>`;
        }).join('');
      }

      section.insertAdjacentHTML('beforeend', `
        <div class="rank-game-block">
          <p class="rank-game-header">${g.icon} Ranking — ${g.name}</p>
          <div class="rank-list">${rowsHtml}</div>
        </div>`);
    }
  }

  loadCardTops();
  loadGameRankings();
})();
</script>

</body>
</html>
